<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SGF Nuisibles">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light only">
<title>SGF Nuisibles</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{color-scheme:light only;
  --bg:#f5f7f5;--surf:#ffffff;--surf2:#f0f3f0;--bord:#e0e4e0;
  --red:#e63030;--grn:#2ea84a;--yel:#d97706;--blu:#2563eb;--ora:#ea6c00;
  --tx:#1a1a1a;--tx2:#4a5448;--tx3:#8a9488;
  --acc:#e63030;--acc2:#2ea84a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100dvh;}

/* LOADING */
#load{position:fixed;inset:0;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .4s;}
#load.hide{opacity:0;pointer-events:none;}
#load img{width:100px;height:100px;object-fit:contain;border-radius:16px;}
.load-bar{width:160px;height:3px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.load-fill{height:100%;background:var(--acc);animation:lb 1.4s ease-in-out infinite;}
@keyframes lb{0%{width:0}60%{width:85%}100%{width:100%}}
.load-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#1a1a1a;}
.load-msg{font-size:12px;color:var(--tx3);}

/* SYNC BAR */
#sync{position:fixed;top:0;left:0;right:0;height:2px;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:999;}
#sync.on{transform:scaleX(1);}

/* APP LAYOUT */
.app{display:flex;height:100dvh;}

/* SIDEBAR */
.sb{width:230px;background:var(--surf);border-right:1px solid var(--bord);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.06);}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:12px;}
.sb-logo img{width:44px;height:44px;object-fit:contain;border-radius:10px;background:#fff;padding:3px;}
.sb-logo-text .company{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--tx);line-height:1;}
.sb-logo-text .tagline{font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.sb-nav{padding:12px 8px;flex:1;overflow-y:auto;}
.sb-sec{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);padding:8px 8px 5px;font-weight:600;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--tx2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:1px solid transparent;}
.sb-item:hover{background:var(--surf2);color:var(--tx);}
.sb-item.on{background:rgba(230,48,48,.08);color:#c42020;border-color:rgba(230,48,48,.25);}
.sb-item .ic{font-size:15px;width:18px;text-align:center;}
.sb-foot{padding:14px;border-top:1px solid var(--bord);font-size:11px;color:var(--tx3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:14px 22px;border-bottom:1px solid var(--bord);background:var(--surf);box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;}
.topbar-logo{display:none;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;flex:1;}
.page{flex:1;overflow-y:auto;padding:18px 22px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;text-decoration:none;}
.btn:active{transform:scale(.97);}
.btn-r{background:var(--acc);color:#fff;}
.btn-r:hover{background:#ff3a3a;}
.btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bord);}
.btn-g:hover{border-color:var(--tx2);color:var(--tx);}
.btn-grn{background:rgba(46,168,74,.15);color:var(--acc2);border:1px solid rgba(46,168,74,.3);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.card{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 12px rgba(230,48,48,.12);}
.card-add{border-style:dashed;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;min-height:90px;color:var(--tx3);}
.card-add:hover{border-color:var(--acc);color:var(--acc);}

/* TABLE */
.tbl-wrap{background:var(--surf);border:1px solid var(--bord);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 14px;text-align:left;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);font-weight:700;border-bottom:1px solid var(--bord);background:var(--surf2);}
.tbl td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(37,40,37,.6);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.click{cursor:pointer;}
.tbl tr.click:hover td{background:rgba(255,255,255,.02);}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.bdg-ok{background:rgba(46,168,74,.15);color:#1a7a35;}
.bdg-actif{background:rgba(230,48,48,.12);color:#c42020;}
.bdg-remplace{background:rgba(249,115,22,.12);color:#d4600a;}
.bdg-absent{background:rgba(100,100,100,.15);color:#555555;}
.bdg-encours{background:rgba(217,119,6,.12);color:#b45309;}
.bdg-actifcontrat{background:rgba(46,168,74,.15);color:#1a7a35;}
.bdg-termine{background:rgba(100,100,100,.15);color:#555555;}
.bdg-planifie{background:rgba(59,130,246,.12);color:#2563eb;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.on{opacity:1;pointer-events:all;}
.modal{background:var(--surf);border:1px solid var(--bord);box-shadow:0 8px 40px rgba(0,0,0,.15);border-radius:14px;width:520px;max-width:96vw;max-height:92vh;overflow-y:auto;transform:translateY(14px);transition:transform .2s;}
.modal-bg.on .modal{transform:translateY(0);}
.mh{padding:16px 20px 14px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px;}
.mh-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;flex:1;}
.mx{background:none;border:1px solid var(--bord);color:var(--tx2);cursor:pointer;width:28px;height:28px;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;}
.mx:hover{border-color:var(--acc);color:var(--acc);}
.mb{padding:16px 20px;}
.mf{padding:12px 20px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--bord);position:sticky;bottom:0;background:var(--surf);z-index:2;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fg label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);font-weight:600;}
.fi,.fs,.fta{background:#fafafa;border:1px solid var(--bord);color:var(--tx);padding:9px 11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .15s;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--acc);}
.fs option{background:var(--surf);}
.fta{resize:vertical;min-height:70px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* DRAWER */
.drw-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;}
.drw-bg.on{opacity:1;pointer-events:all;}
.drw{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:100vw;background:var(--surf);border-left:1px solid var(--bord);box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:401;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;display:flex;flex-direction:column;}
.drw-bg.on .drw{transform:translateX(0);}
.dh{padding:16px 20px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surf);position:sticky;top:0;z-index:1;}
.dh-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;flex:1;}
.db{padding:16px 20px;flex:1;}
.ds{margin-bottom:18px;}
.ds-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);font-weight:700;margin-bottom:9px;}
.info-row{display:flex;gap:8px;align-items:flex-start;font-size:13px;margin-bottom:6px;}
.info-lbl{color:var(--tx3);width:70px;flex-shrink:0;font-size:12px;}

/* CONFIRM PLAN */
.cfm-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.cfm-bg.on{opacity:1;pointer-events:all;}
.cfm{background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:22px;max-width:380px;width:92%;text-align:center;}
.cfm-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:6px;}
.cfm-img{width:100%;max-height:170px;object-fit:contain;border-radius:10px;margin-bottom:14px;border:1px solid var(--bord);}

/* PLAN */
.plan-tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.plan-tabs::-webkit-scrollbar{display:none;}
.ptab{padding:5px 13px;border-radius:14px;border:1px solid var(--bord);background:var(--surf2);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.ptab.on{background:rgba(230,48,48,.1);color:#c42020;border-color:rgba(230,48,48,.35);}
.ptab-add{padding:5px 10px;border-radius:14px;border:1px dashed var(--bord);color:var(--tx3);font-size:12px;cursor:pointer;white-space:nowrap;}
.ptab-add:hover{border-color:var(--acc);color:var(--acc);}
.plan-tb{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.ptb{padding:5px 12px;border-radius:7px;border:1px solid var(--bord);background:var(--surf2);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.ptb.on{background:rgba(230,48,48,.1);color:#c42020;border-color:rgba(230,48,48,.35);}
.ptb:hover{border-color:var(--tx2);color:var(--tx);}
.plan-box{position:relative;background:#e8e8e8;border:1px solid var(--bord);border-radius:12px;overflow:hidden;user-select:none;display:flex;align-items:center;justify-content:center;min-height:280px;}
.plan-box img{display:block;width:100%;height:auto;pointer-events:none;}

/* TYPE SELECTOR */
.type-sel{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 10px;}
.type-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--bord);background:var(--surf2);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;}
.type-btn.on{background:rgba(230,48,48,.1);color:#c42020;border-color:rgba(230,48,48,.35);}

/* PIN */
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:10;transition:transform .12s;}
.pin:hover,.pin.sel{transform:translate(-50%,-100%) scale(1.2);z-index:20;}
.pin-num{position:absolute;bottom:33px;left:50%;transform:translateX(-50%);background:#e63030;color:#fff;font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;pointer-events:none;font-family:monospace;border:1px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.6);}
.pin-bubble{width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.pin-bubble span{transform:rotate(45deg);font-size:13px;}
.pin-null .pin-bubble{background:#aaaaaa;border:2px solid #888888;}
.pin-sain .pin-bubble{background:rgba(46,168,74,.9);border:2px solid #2ea84a;}
.pin-manquant .pin-bubble{background:rgba(230,48,48,.9);border:2px solid #e63030;animation:blink .8s infinite;}
.pin-consomme .pin-bubble{background:rgba(249,115,22,.9);border:2px solid #f97316;}
.pin-realimente .pin-bubble{background:rgba(59,130,246,.9);border:2px solid #3b82f6;}
.pin-controle .pin-bubble{background:rgba(138,148,136,.8);border:2px solid #8a9488;}
.pin-mise_en_place .pin-bubble{background:rgba(124,58,237,.9);border:2px solid #7c3aed;}

@keyframes blink{0%,100%{box-shadow:0 0 8px rgba(230,48,48,.8);}50%{box-shadow:0 0 0px rgba(230,48,48,0);}}

/* PIN POPUP */
.pin-pop{position:absolute;background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:14px;width:250px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.pp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.pp-title{font-size:13px;font-weight:700;}
.pp-sub{font-size:11px;color:var(--tx3);margin-top:1px;}
.pp-x{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:15px;padding:2px;}
.pp-sec{font-size:9px;color:var(--tx3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:8px 0 5px;}
.pp-btns{display:flex;gap:4px;flex-wrap:wrap;}
.pp-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--bord);background:var(--surf2);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;}
.pp-btn.on-ok{background:rgba(46,168,74,.2);color:#2ea84a;border-color:#2ea84a;}
.pp-btn.on-actif{background:rgba(230,48,48,.2);color:#e63030;border-color:#e63030;}
.pp-btn.on-remplace{background:rgba(249,115,22,.2);color:#f97316;border-color:#f97316;}
.pp-btn.on-absent{background:rgba(74,82,74,.25);color:#8a9488;border-color:#4a524a;}
.pp-btn.on-prod{background:rgba(59,130,246,.15);color:var(--blu);border-color:var(--blu);}
.pp-btn.on-sub{background:rgba(230,48,48,.12);color:var(--acc);border-color:var(--acc);}
.pp-btn.on-conso{background:rgba(240,180,41,.15);color:var(--yel);border-color:var(--yel);}
.pp-note{width:100%;background:#f9f9f9;border:1px solid var(--bord);color:var(--tx);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 8px;resize:none;outline:none;margin-top:4px;}
.pp-note:focus{border-color:var(--acc);}
.pp-photo{width:100%;max-height:90px;object-fit:cover;border-radius:7px;margin-bottom:8px;border:1px solid var(--bord);cursor:pointer;}
.pp-photo-label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--tx3);margin-top:6px;padding:4px 0;}
.pp-photo-label:hover{color:var(--acc);}

/* PASSAGE CARD */
.pass-card{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.pass-card:hover{border-color:var(--tx2);}
.pass-stats{display:flex;gap:0;margin-top:10px;padding-top:10px;border-top:1px solid var(--bord);}
.pst{text-align:center;flex:1;}
.pst-v{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
.pst-l{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}

/* SESSION HEADER */
.sess-head{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surf);border:1px solid var(--acc);box-shadow:0 4px 16px rgba(0,0,0,.15);box-shadow:0 2px 16px rgba(0,0,0,.15);box-shadow:0 4px 20px rgba(0,0,0,.15);border-radius:10px;padding:11px 16px;font-size:13px;z-index:9998;display:flex;align-items:center;gap:8px;transform:translateY(60px);opacity:0;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.12);}
.toast.on{transform:translateY(0);opacity:1;}

/* HEATMAP LEGEND */
.hm-legend{display:flex;gap:12px;font-size:11px;color:var(--tx3);margin-top:8px;flex-wrap:wrap;}

/* SIGNATURE */
.sig-wrap{background:#fff;border:2px solid var(--bord);border-radius:10px;overflow:hidden;position:relative;cursor:crosshair;}
.sig-wrap canvas{display:block;touch-action:none;}
.sig-btns{display:flex;gap:8px;margin-top:8px;}

/* TOOLTIP */
.pin-tooltip{position:absolute;background:#1a1a1a;color:#fff;font-size:11px;padding:6px 10px;border-radius:8px;pointer-events:none;z-index:50;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.4);max-width:200px;white-space:normal;}
.pin-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1a1a;}

/* MOBILE */
@media(max-width:768px){
  .sb{display:none;}
  .app{flex-direction:column;}
  .topbar-logo{display:flex;align-items:center;gap:8px;}
  .topbar-logo img{width:30px;height:30px;object-fit:contain;border-radius:6px;background:#fff;padding:2px;}
  .topbar-logo span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--tx);}
  .topbar{padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));}
  .topbar-title{font-size:18px;}
  .topbar .btn{font-size:12px;padding:6px 11px;}
  .page{padding:12px 14px;padding-bottom:calc(66px + env(safe-area-inset-bottom));}
  .cards{grid-template-columns:1fr;}
  .tbl th,.tbl td{padding:9px 11px;font-size:12px;}
  .drw{width:100%;border-left:none;border-top:1px solid var(--bord);border-radius:14px 14px 0 0;top:auto;height:88vh;}
  .modal{border-radius:14px 14px 0 0;position:fixed;bottom:0;left:0;right:0;width:100%;max-width:100%;max-height:90vh;padding-bottom:calc(56px + env(safe-area-inset-bottom));}
  .modal-bg{align-items:flex-end;}
  .toast{right:10px;left:10px;bottom:calc(66px + env(safe-area-inset-bottom));}
  #mobnav{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--bord);box-shadow:0 -2px 10px rgba(0,0,0,.08);box-shadow:0 -2px 10px rgba(0,0,0,.08);display:flex;align-items:flex-start;justify-content:space-around;padding-top:6px;padding-bottom:env(safe-area-inset-bottom);z-index:200;}
  .mn-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px 8px;min-width:48px;position:relative;background:none;border:none;font-family:'DM Sans',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .mn-icon{font-size:20px;}
  .mn-lbl{font-size:9px;color:var(--tx3);font-weight:600;text-transform:uppercase;}
  .mn-item.on .mn-lbl{color:#c42020;font-weight:700;}
  .mn-item.on .mn-icon{filter:drop-shadow(0 0 8px rgba(230,48,48,.9));transform:scale(1.15);}
  .mn-item.on{background:rgba(230,48,48,.12);border-radius:10px;}

// ═══ HELPERS ═══
function pt(id){return POSTE_TYPES.find(function(t){return t.id===id;})||POSTE_TYPES[POSTE_TYPES.length-1];}
function gcl(id){return clients.find(function(c){return c.id===id;})||{nom:'—',adresse:'',tel:'',email:'',notes:''};}
function gct(id){return contrats.find(function(c){return c.id===id;});}
function gContratPlans(cid){return plans.filter(function(p){return p.contrat_id===cid;});}
function gContratPostes(cid){return postes.filter(function(p){return p.contrat_id===cid;});}
function gPlanPostes(pid){return postes.filter(function(p){return p.plan_id===pid;});}
function gPassRes(passId){return resultats.filter(function(r){return r.passage_id===passId;});}
function gPosteRes(passId,posteId){return resultats.find(function(r){return r.passage_id===passId&&r.poste_id==posteId;});}
function gClientContrats(cid){return contrats.filter(function(c){return c.client_id===cid;});}
function gClientPassages(cid){return passages.filter(function(p){return p.client_id===cid;}).sort(function(a,b){return b.date_passage.localeCompare(a.date_passage);});}
function gContratPassages(cid){return passages.filter(function(p){return p.contrat_id===cid;}).sort(function(a,b){return b.date_passage.localeCompare(a.date_passage);});}
function fdate(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function syncOn(){document.getElementById('sync').classList.add('on');}
function syncOff(){document.getElementById('sync').classList.remove('on');}
function setLoad(m){var e=document.getElementById('load-msg');if(e)e.textContent=m;}

function badge(s){
  var m={ok:'bdg-ok ✅ OK',actif:'bdg-actif ⚠️ Actif',remplace:'bdg-remplace 🔄 Remplacé',absent:'bdg-absent ❌ Absent',encours:'bdg-encours ⏳ En cours',actifcontrat:'bdg-actifcontrat ✓ Actif',termine:'bdg-termine Terminé'};
  var v=m[s]||s;var parts=v.split(' ');var cls=parts.shift();
  return '<span class="bdg '+cls+'">'+parts.join(' ')+'</span>';
}

function toast(msg,warn){
  var t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.style.borderColor=warn?'var(--ora)':'var(--acc)';
  t.classList.add('on');clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('on');},3000);
}

// ═══ LOAD DATA ═══
async function loadAll(){
  setLoad('Chargement…');
  var r=await db.from('clients').select('*').order('nom');
  if(r.error)throw new Error(r.error.message);
  clients=r.data||[];
  r=await db.from('contrats').select('*').order('client_id');
  contrats=r.data||[];
  r=await db.from('contacts').select('*').order('client_id');
  contacts=r.data||[];
  r=await db.from('postes').select('*').order('id');
  postes=r.data||[];
  r=await db.from('plans').select('*').order('ordre');
  plans=r.data||[];
  r=await db.from('passages').select('*').order('date_passage',{ascending:false});
  passages=r.data||[];
  r=await db.from('resultats_postes').select('*');
  resultats=r.data||[];
  r=await db.from('echeancier').select('*').order('date_echeance');
  echeancier=r.data||[];
}

// ═══ NAVIGATION ═══
function go(view){
  curView=view;
  // Reset terrain state when leaving terrain
  if(view!=='terrain'){curPassageId=null;curPlanId=null;curContratId=null;}
  ['clients','terrain','rapports','facturation'].forEach(function(v){
    var si=document.getElementById('si-'+v);var mn=document.getElementById('mn-'+v);
    if(si)si.classList.toggle('on',v===view);
    if(mn)mn.classList.toggle('on',v===view);
  });
  var titles={clients:'CLIENTS',terrain:'TERRAIN',rapports:'PASSAGES',facturation:'FACTURATION'};
  document.getElementById('page-title').textContent=titles[view]||view.toUpperCase();
  if(view==='clients')renderClients();
  else if(view==='terrain'){
    if(curPassageId){openTerrain(curPassageId);}
    else{renderTerrain();}
  }
  else if(view==='facturation')renderFacturation();
  else renderRapports();
}

function openClientDrw(cid){

  if(c.tel)h+='<div class="info-row"><span class="info-lbl">📞 Tél.</span><a href="tel:'+c.tel+'" style="color:var(--acc)">'+c.tel+'</a></div>';
  if(c.email)h+='<div class="info-row"><span class="info-lbl">✉️ Email</span><a href="mailto:'+c.email+'" style="color:var(--blu)">'+c.email+'</a></div>';
  if(c.notes)h+='<div class="info-row"><span class="info-lbl">📝 Notes</span><span style="color:var(--tx2)">'+c.notes+'</span></div>';

  h+='<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-g btn-sm" onclick="modalClient('+cid+')">✏️ Modifier</button><button class="btn btn-sm" style="background:rgba(230,48,48,.1);color:var(--acc);border:1px solid rgba(230,48,48,.2)" onclick="deleteClient('+cid+')">🗑️ Supprimer</button></div>';

  h+='<div class="ds"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><div class="ds-title" style="margin:0">CONTACTS</div><button class="btn btn-g btn-xs" onclick="modalContact('+cid+')">+ Ajouter</button></div>';

  else{
    cContacts.forEach(function(ct){
      h+='<div style="background:#f8f8f8;border-radius:9px;padding:11px;margin-bottom:7px;border:1px solid var(--bord)">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:600;font-size:13px">'+ct.nom+(ct.principal?' <span style="font-size:10px;background:rgba(230,48,48,.1);color:var(--acc);padding:1px 5px;border-radius:4px">Principal</span>':'')+'</div>';
      if(ct.role)h+='<div style="font-size:11px;color:var(--tx3)">'+ct.role+'</div>';
      h+='</div><button onclick="deleteContact('+ct.id+','+cid+')" style="background:none;border:none;color:var(--tx3);cursor:pointer">🗑️</button></div>';
      h+='<div style="display:flex;gap:10px;margin-top:7px;flex-wrap:wrap">';
      if(ct.tel)h+='<a href="tel:'+ct.tel+'" style="font-size:12px;color:var(--acc)">📞 '+ct.tel+'</a>';
      if(ct.email)h+='<a href="mailto:'+ct.email+'" style="font-size:12px;color:var(--blu)">✉️ '+ct.email+'</a>';
      h+='</div></div>';
    });
  }
  h+='</div>';

  if(cContrats.length===0){h+='<div style="color:var(--tx3);font-size:12px">Aucun contrat</div>';}
  else{
    cContrats.forEach(function(ct){
      var nbP=gContratPostes(ct.id).length;
      var nbPl=gContratPlans(ct.id).length;
      var nbPass=gContratPassages(ct.id).length;
      var last=gContratPassages(ct.id)[0];
      h+='<div style="background:#f8f8f8;border:1px solid var(--bord);border-radius:12px;padding:14px;margin-bottom:10px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-weight:700;font-size:14px">'+ct.nom+'</div><div style="font-size:11px;color:var(--tx3)">'+ct.type+' · '+fdate(ct.date_debut)+' → '+fdate(ct.date_fin)+'</div></div>'+badge(ct.statut==='actif'?'actifcontrat':'termine')+'</div>';
      h+='<div style="display:flex;gap:0;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:10px">';
      h+='<div class="pst"><div class="pst-v">'+nbP+'</div><div class="pst-l">Postes</div></div>';
      h+='<div class="pst"><div class="pst-v" style="color:var(--acc)">'+nbPl+'</div><div class="pst-l">Plans</div></div>';
      h+='<div class="pst"><div class="pst-v" style="color:var(--blu)">'+nbPass+'</div><div class="pst-l">Passages</div></div>';
      if(last)h+='<div class="pst"><div style="font-size:10px;color:var(--tx3)">Dernier<br>'+fdate(last.date_passage)+'</div></div>';
      h+='</div>';
      // Postes list by zone
      var cPostes=gContratPostes(ct.id);
      if(cPostes.length>0){
        var zones={};
        cPostes.forEach(function(p){var z=p.zone||'Général';if(!zones[z])zones[z]=[];zones[z].push(p);});
        Object.keys(zones).forEach(function(z){
          h+='<div style="font-size:9px;color:var(--tx3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">📍 '+z+'</div>';
          h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px">';
          zones[z].forEach(function(p){
            var ptype=pt(p.type_id);
            h+='<span style="font-size:11px;background:var(--surf);border:1px solid var(--bord);border-radius:6px;padding:2px 7px">'+ptype.icon+' '+p.label+'</span>';
          });
          h+='</div>';
        });
      }
      h+='<div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-r btn-sm" onclick="startTerrain('+cid+','+ct.id+')">✅ Démarrer une visite</button><button class="btn btn-g btn-sm" onclick="openPassagesDrw('+ct.id+')">📋 Passages</button><button class="btn btn-sm" style="background:rgba(230,48,48,.1);color:var(--acc);border:1px solid rgba(230,48,48,.2)" onclick="deleteContrat('+ct.id+','+cid+')">🗑️</button></div>';
      h+='</div>';
    });
  }
  h+='</div>';

  openDrw(c.nom.toUpperCase(), h);
}

function renderTerrain(){

    var nb=gClientContrats(c.id).filter(function(ct){return ct.statut==='actif';}).length;

function startTerrain(cid,ctid){
  closeDrw();
  curContratId=ctid;
  go('terrain');
  setTimeout(function(){openPassagesDrw(ctid);},300);
}

function pickContrat(cid){
  var actifs=gClientContrats(cid).filter(function(ct){return ct.statut==='actif';});
  if(actifs.length===0){toast('Aucun contrat actif pour ce client',true);return;}
  if(actifs.length===1){openPassagesDrw(actifs[0].id);return;}
  var h='<div style="font-size:13px;color:var(--tx2);margin-bottom:14px">Choisissez le contrat :</div>';
  actifs.forEach(function(ct){
    h+='<div class="card" style="margin-bottom:10px" onclick="closeDrw();openPassagesDrw('+ct.id+')">';
    h+='<div style="font-weight:700;font-size:14px;margin-bottom:3px">'+ct.nom+'</div>';
    h+='<div style="font-size:11px;color:var(--tx3)">'+ct.type+' · '+fdate(ct.date_debut)+' → '+fdate(ct.date_fin)+'</div>';
    h+='<div style="font-size:12px;color:var(--tx3);margin-top:5px">'+gContratPostes(ct.id).length+' postes dans le parc</div></div>';
  });
  openDrw('CHOISIR UN CONTRAT', h);
}

function openPassagesDrw(contratId){
  curContratId=contratId;
  var ctr=gct(contratId);
  var c=gcl(ctr.client_id);
  var passContrat=gContratPassages(contratId);
  var enCours=passContrat.find(function(p){return p.statut==='en_cours';});

  var h='';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:2px">'+c.nom+'</div>';
  h+='<div style="font-size:12px;color:var(--acc);margin-bottom:3px">'+ctr.nom+'</div>';
  h+='<div style="font-size:11px;color:var(--tx3);margin-bottom:18px">'+ctr.type+' · '+fdate(ctr.date_debut)+' → '+fdate(ctr.date_fin)+'</div>';

  if(enCours){
    h+='<div style="background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.2);border-radius:12px;padding:14px;margin-bottom:16px">';
    h+='<div style="font-size:12px;font-weight:700;color:var(--yel);margin-bottom:8px">⏳ Visite en cours — '+fdate(enCours.date_passage)+'</div>';
    h+='<button class="btn btn-r" style="width:100%;justify-content:center" data-fn="openTerrain" data-passid="'+enCours.id+'">▶ Reprendre cette visite</button></div>';
  }

  h+='<button class="btn btn-r" style="width:100%;justify-content:center;padding:13px;margin-bottom:18px" data-fn="createPassage" data-cid="'+ctr.client_id+'" data-ctid="'+contratId+'">+ Démarrer une nouvelle visite</button>';

  if(passContrat.length>0){
    h+='<div class="ds-title">HISTORIQUE DES PASSAGES</div>';
    passContrat.forEach(function(pa){
      var res=gPassRes(pa.id);
      var ok=res.filter(function(r){return r.statut==='ok';}).length;
      var actif=res.filter(function(r){return r.statut==='actif';}).length;
      var total=gContratPostes(contratId).length;
      h+='<div class="pass-card" onclick="closeDrw();openTerrain('+pa.id+')">';
      h+='<div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:1px;color:var(--acc)">'+fdate(pa.date_passage)+'</div>';
      h+='<div style="font-size:11px;color:var(--tx3)">'+badge(pa.statut==='termine'?'actifcontrat':'encours')+'</div></div>';
      h+='<div style="display:flex;gap:6px"><button class="btn btn-g btn-xs" onclick="event.stopPropagation();exportPDF('+pa.id+')">📄 PDF</button><button class="btn btn-g btn-xs" onclick="event.stopPropagation();emailPassage('+pa.id+')">📧</button></div></div>';
      h+='<div class="pass-stats">';
      h+='<div class="pst"><div class="pst-v" style="color:var(--acc2)">'+ok+'</div><div class="pst-l">OK</div></div>';
      h+='<div class="pst"><div class="pst-v" style="color:'+(actif>0?'var(--acc)':'var(--tx3)')+'">'+actif+'</div><div class="pst-l">Actif</div></div>';
      h+='<div class="pst"><div class="pst-v">'+res.length+'/'+total+'</div><div class="pst-l">Vérifiés</div></div>';
      var nbTox=res.filter(function(r){return r.produit==='toxique';}).length;
      h+='<div class="pst"><div class="pst-v" style="color:var(--ora)">'+nbTox+'</div><div class="pst-l">Toxique</div></div>';
      h+='</div>';
      if(pa.notes)h+='<div style="font-size:12px;color:var(--tx2);margin-top:8px;padding-top:8px;border-top:1px solid var(--bord)">'+pa.notes+'</div>';

function createPassage(cid,ctid){
  var today=new Date().toISOString().split('T')[0];
  document.getElementById('modal-title').textContent='DATE DE LA VISITE';
  document.getElementById('modal-body').innerHTML=
    '<div class="fg"><label>Date du passage</label><input class="fi" id="f-passage-date" type="date" value="'+today+'"></div>';
  document.getElementById('modal-foot').innerHTML=
    '<button class="btn btn-g" id="btn-annuler-passage">Annuler</button>'+
    '<button class="btn btn-r" id="btn-confirmer-passage">Démarrer</button>';
  document.getElementById('btn-annuler-passage').addEventListener('click',function(){closeModal();});
  document.getElementById('btn-confirmer-passage').addEventListener('click',function(){
    var date=document.getElementById('f-passage-date').value||today;
    closeModal();closeDrw();syncOn();
    db.from('passages').insert({client_id:cid,contrat_id:ctid,date_passage:date,statut:'en_cours',notes:''}).select().single().then(function(r){
      syncOff();
      if(r.error){toast('⚠️ Erreur création',true);return;}
      passages.unshift(r.data);
      openTerrain(r.data.id);
    });
  });
  document.getElementById('modal-bg').classList.add('on');
}

// ═══════════════════════════════════════════
// TERRAIN VIEW
// ═══════════════════════════════════════════
function openTerrain(passageId){
  curPassageId=passageId;
  var pa=passages.find(function(p){return p.id===passageId;});
  if(!pa)return;
  var ctr=gct(pa.contrat_id);
  var c=gcl(pa.client_id);
  var isRO=pa.statut==='termine';
  var cPlans=gContratPlans(pa.contrat_id);
  if(!curPlanId||!cPlans.find(function(p){return p.id===curPlanId&&p.contrat_id===pa.contrat_id;})){
    curPlanId=cPlans.length>0?cPlans[0].id:null;
  }
  if(!placingType)placingType=null;
  document.getElementById('topbar-act').innerHTML='<button class="btn btn-g btn-sm" onclick="backToPassages()">← Retour</button>';

  // Session header
  var allP=gContratPostes(pa.contrat_id);
  var res=gPassRes(passageId);
  var total=allP.length,checked=res.length;
  var ok=res.filter(function(r){return r.statut==='ok';}).length;
  var actif=res.filter(function(r){return r.statut==='actif';}).length;
  var pct=total?Math.round(checked/total*100):0;
  var r22=22,circ=2*Math.PI*r22,dash=circ*pct/100;

  var h='';
  h+='<div class="sess-head">';
  h+='<svg width="48" height="48" viewBox="0 0 48 48" style="flex-shrink:0">';
  h+='<circle cx="24" cy="24" r="'+r22+'" fill="none" stroke="var(--surf2)" stroke-width="4"/>';
  h+='<circle cx="24" cy="24" r="'+r22+'" fill="none" stroke="var(--acc)" stroke-width="4" stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round" transform="rotate(-90 24 24)"/>';
  h+='<text x="24" y="29" text-anchor="middle" fill="var(--acc)" font-family="Bebas Neue,sans-serif" font-size="12">'+pct+'%</text>';
  h+='</svg>';
  h+='<div style="flex:1;min-width:0"><div style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.nom+'</div><div style="font-size:11px;color:var(--acc)">'+ctr.nom+'</div><div style="font-size:10px;color:var(--tx3)">'+fdate(pa.date_passage)+' · '+checked+'/'+total+(isRO?' · ✅ Terminé':'')+'</div></div>';
  h+='<div style="display:flex;gap:8px;flex-shrink:0">';
  h+='<div class="pst"><div class="pst-v" style="color:var(--acc2);font-size:18px">'+ok+'</div><div class="pst-l">OK</div></div>';
  h+='<div class="pst"><div class="pst-v" style="color:'+(actif>0?'var(--acc)':'var(--tx3)')+';font-size:18px">'+actif+'</div><div class="pst-l">Actif</div></div>';
  if(!isRO&&checked===total&&total>0)h+='<button class="btn btn-grn btn-sm" onclick="terminer('+passageId+')" style="white-space:nowrap">✓ Terminer</button>';
  if(!isRO&&(checked<total||total===0))h+='<div style="font-size:10px;color:var(--tx3);text-align:center;white-space:nowrap">'+checked+'/'+total+' vérifiés<br><span style="color:var(--acc)">à compléter</span></div>';
  if(isRO&&!pa.signature)h+='<button class="btn btn-r btn-sm" onclick="openSignature('+passageId+')" style="white-space:nowrap">✍️ Signature</button>';
  if(isRO&&pa.signature)h+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><img src="'+pa.signature+'" style="height:32px;border:1px solid var(--bord);border-radius:6px;background:#fff">'+(pa.signataire?'<span style="font-size:9px;color:var(--tx3)">'+pa.signataire+'</span>':'')+'</div>';
  h+='</div></div>';

  // Tabs plans
  h+='<div class="plan-tabs">';
  cPlans.forEach(function(pl){
    h+='<div class="ptab'+(pl.id===curPlanId?' on':'')+'" onclick="switchPlan('+pl.id+','+passageId+')">'+pl.nom+'</div>';
  });
  if(!isRO)h+='<div class="ptab-add" onclick="addNiveau('+pa.contrat_id+','+passageId+')" style="background:rgba(230,48,48,.1);color:var(--acc);border-color:rgba(230,48,48,.4);font-weight:700;padding:5px 14px">＋ Niveau</div>';
  h+='</div>';

  // Toolbar plan
  h+='<div class="plan-tb">';
  h+='<button class="ptb on">🗺️ Plan</button>';
  h+='<button class="ptb" onclick="showListe('+passageId+')">☰ Liste</button>';
  h+='<div style="flex:1"></div>';
  h+='<button class="ptb'+(heatmapOn?' on':'')+'" onclick="toggleHeatmap('+passageId+')" title="Heatmap">🌡️</button>';
  if(!isRO&&curPlanId)h+='<button class="ptb'+(placingType?' on':'')+'" onclick="togglePlacing('+passageId+')">'+( placingType?'✕ Annuler':'📍 Placer')+'</button>';
  h+='</div>';

  // Type selector
  if(placingType&&!isRO){
    var contrat=gct(pa.contrat_id);
    var isMoustique=contrat&&contrat.type==='moustique';
    var typesDispos=isMoustique
      ? POSTE_TYPES.filter(function(t){return POSTE_TYPES_MOUSTIQUES.indexOf(t.id)>=0;})

// ═══ PIN POPUP ═══
function buildPinPopup(pid,passageId,isRO){
  var p=postes.find(function(x){return x.id==pid;});
  if(!p)return'';
  var ptype=pt(p.type_id);
  var res=gPosteRes(passageId,pid);
  var statut=res?res.statut:null;
  var produit=res?res.produit||'':'';;
  var substance=res?res.substance||'':'';;
  var substAutre=res?res.substance_autre||'':'';;
  var conso=res?res.conso||'':'';;
  var note=res?res.note||'':'';;
  var left=p.x>60?'auto':'8px',right=p.x>60?'8px':'auto';
  var top=p.y>55?'auto':'8px',bottom=p.y>55?'8px':'auto';

  var h='<div class="pin-pop" style="left:'+left+';right:'+right+';top:'+top+';bottom:'+bottom+'" onclick="event.stopPropagation()">';
  h+='<div class="pp-head"><div><div class="pp-title">'+ ptype.icon+' '+p.label+'</div><div class="pp-sub">'+ptype.label+(p.zone?' · '+p.zone:'' )+'</div></div><button class="pp-x" onclick="openPinId=null;openTerrain('+passageId+')">✕</button></div>';

  if(p.photo_url)h+='<img src="'+p.photo_url+'" class="pp-photo">';

  if(!isRO){
    // Si poste moustique → interface dédiée
    if(POSTE_TYPES_MOUSTIQUES.indexOf(p.type_id)>=0){
      var actions=ACTIONS_MOUSTIQUES[p.type_id]||[];
      var actionFaite=res?res.produit||'':'';
      h+='<div class="pp-sec">ACTION RÉALISÉE</div><div class="pp-btns">';
      actions.forEach(function(a){
        var isSel=actionFaite===a.id;
        h+='<button class="pp-btn'+(isSel?' on-prod':'')+'" onclick="setProduit('+pid+',\''+a.id+'\','+passageId+')">'+a.label+'</button>';
      });
      h+='</div>';
      h+='<div class="pp-sec">ÉTAT</div><div class="pp-btns">';
      [{id:'controle',label:'Contrôlé',color:'#2ea84a'},{id:'manquant',label:'Manquant',color:'#e63030'}].forEach(function(et){
        var isSel=statut===et.id;
        h+='<button class="pp-btn" style="border-color:'+(isSel?et.color:'var(--bord)')+';background:'+(isSel?et.color+'22':'var(--surf2)')+';color:'+(isSel?et.color:'var(--tx2)')+'" onclick="setStatut('+pid+',\''+et.id+'\','+passageId+')">'+et.label+'</button>';
      });
      h+='</div>';
    } else {
    // Interface classique nuisibles
    // Etat
    h+='<div class="pp-sec">ÉTAT DU POSTE</div><div class="pp-btns">';
    ETATS.forEach(function(et){
      var isSel=statut===et.id;
      h+='<button class="pp-btn" style="border-color:'+(isSel?et.color:'var(--bord)')+';background:'+(isSel?et.color+'22':'var(--surf2)')+';color:'+(isSel?et.color:'var(--tx2)')+'" onclick="setStatut('+pid+',\''+et.id+'\','+passageId+')">'+et.label+'</button>';
    });
    h+='</div>';

    // Produit
    h+='<div class="pp-sec">PRODUIT</div><div class="pp-btns">';
    PRODUITS.forEach(function(pr){
      h+='<button class="pp-btn'+(produit===pr.id?' on-prod':'')+'" onclick="setProduit('+pid+',\''+pr.id+'\','+passageId+')">'+ pr.label+'</button>';
    });
    h+='</div>';

    // Substance (si toxique)
    if(produit==='toxique'){
      h+='<div class="pp-sec">SUBSTANCE ACTIVE</div><div class="pp-btns">';
      SUBSTANCES.forEach(function(s){
        h+='<button class="pp-btn'+(substance===s.id?' on-sub':'')+'" onclick="setSubstance('+pid+',\''+s.id+'\','+passageId+')">'+ s.label+'</button>';
      });
      h+='</div>';
      if(substance==='autre')h+='<input class="fi" style="font-size:11px;padding:5px 9px;margin-bottom:4px" placeholder="Préciser..." value="'+substAutre+'" onchange="setSubstAutre('+pid+',this.value,'+passageId+')">';
    }

    // Conso
    if(produit&&produit!=='aucun'){
      h+='<div class="pp-sec">CONSOMMATION</div><div class="pp-btns">';
      CONSO.forEach(function(c){
        h+='<button class="pp-btn'+(conso===c.id?' on-conso':'')+'" onclick="setConso('+pid+',\''+c.id+'\','+passageId+')">'+ c.label+'</button>';
      });
      h+='</div>';
    }
    } // fin else interface classique

    // Note (commune)
    h+='<div class="pp-sec">NOTE</div>';
    h+='<textarea class="pp-note" rows="2" placeholder="Observations..." onchange="setNote('+pid+',this.value,'+passageId+')">'+ note+'</textarea>';

    // Photo
    h+='<label class="pp-photo-label"><input type="file" accept="image/*" style="display:none" onchange="uploadPinPhoto(event,'+pid+','+passageId+')">'+(p.photo_url?'🔄 Changer la photo':'📷 Ajouter une photo')+'</label>';
    h+='<button onclick="deletePoste('+pid+','+passageId+')" style="margin-top:8px;background:none;border:1px solid rgba(230,48,48,.2);color:var(--acc);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;width:100%">🗑️ Supprimer ce poste du parc</button>';
  } else {
    var sl={ok:'✅ OK',actif:'⚠️ Actif',remplace:'🔄 Remplacé',absent:'❌ Absent'};
    var pl={placebo:'Placebo',toxique:'Toxique',capture:'Capture',aucun:'Aucun'};
    var subl={difenacoum:'Difenacoum',bromadiolone:'Bromadiolone',brodifacoum:'Brodifacoum',chlorophacinone:'Chlorophacinone',autre:substAutre||'Autre'};
    if(statut)h+='<div style="font-size:13px;font-weight:600;margin-bottom:5px">'+(sl[statut]||statut)+'</div>';
    if(produit)h+='<div style="font-size:12px;color:var(--tx3);margin-bottom:3px">Produit : '+(pl[produit]||produit)+(substance?' — '+(subl[substance]||substance):'')+'</div>';
    if(conso)h+='<div style="font-size:12px;color:var(--tx3);margin-bottom:3px">Consommation : '+conso+'%</div>';
    if(note)h+='<div style="font-size:12px;color:var(--tx2)">'+ note+'</div>';
  }
  h+='</div>';
  return h;
}


// Lightweight refresh - only update pin colors and popup, not full page
function refreshPinAndHeader(passageId){
  // Update pin colors
  var pa=passages.find(function(p){return p.id===passageId;});
  var isRO=pa?pa.statut==='termine':false;
  var allPostes=gContratPostes(pa?pa.contrat_id:0);
  allPostes.forEach(function(p){
    var pinEl=document.getElementById('pin-'+p.id);
    if(!pinEl)return;
    var res=gPosteRes(passageId,p.id);
    var s=res?res.statut:null;
    pinEl.className='pin pin-'+(s||'null')+(openPinId===p.id?' sel':'');
  });
  // Update popup if open
  if(openPinId){
    var existing=document.getElementById('pin-popup-container');
    if(existing){
      existing.innerHTML=buildPinPopup(openPinId,passageId,isRO);
    }
  }
  // Update session header stats
  var res=gPassRes(passageId);
  var total=allPostes.length,checked=res.length;
  var ok=res.filter(function(r){return r.statut==='ok';}).length;
  var actif=res.filter(function(r){return r.statut==='actif';}).length;
  var pct=total?Math.round(checked/total*100):0;
  // Update progress circle text
  var pctEl=document.querySelector('.sess-head text');
  if(pctEl)pctEl.textContent=pct+'%';
}

// ═══ PLAN ACTIONS ═══
function switchPlan(planId,passageId){curPlanId=planId;openPinId=null;placingType=null;openTerrain(passageId);}
function togglePlacing(passageId){placingType=placingType?null:POSTE_TYPES[0].id;openTerrain(passageId);}
function selType(typeId,passageId){placingType=typeId;openTerrain(passageId);}

function planClick(e,passageId){
  if(e.target.closest('.pin')||e.target.closest('.pin-pop'))return;
  if(!placingType){
    if(openPinId){openPinId=null;openTerrain(passageId);}
    return;
  }
  var box=document.getElementById('plan-box');
  if(!box)return;
  var pa=passages.find(function(p){return p.id===passageId;});
  if(!pa||pa.statut==='termine')return;
  var rect=box.getBoundingClientRect();
  var src=e.touches?e.touches[0]:e;
  var x=parseFloat(((src.clientX-rect.left)/rect.width*100).toFixed(1));
  var y=parseFloat(((src.clientY-rect.top)/rect.height*100).toFixed(1));
  var label=prompt('Numéro / Nom du poste (ex: P01, S01, IR01) :');
  if(!label)return;
  var zone=prompt('Zone (ex: Cuisine, Hall, Salle de resto…) :')||'Général';
  syncOn();
  db.from('postes').insert({client_id:pa.client_id,contrat_id:pa.contrat_id,plan_id:curPlanId,type_id:placingType,label:label,zone:zone,x:x,y:y}).select().single().then(function(r){
    syncOff();
    if(r.error){toast('⚠️ Erreur',true);return;}
    postes.push(r.data);toast('✓ Poste "'+label+'" ajouté');
    openTerrain(passageId);
  });
}

function pinClick(e,pinId,passageId){
  e.stopPropagation();e.preventDefault();
  var was=pinDrag.moved;pinDrag.moved=false;
  if(was)return;
  openPinId=openPinId===pinId?null:pinId;
  openTerrain(passageId);
}


// ═══ PIN DRAG ═══
function pinDragStart(e,pid){
  var pa=passages.find(function(p){return p.id===curPassageId;});
  if(!pa||pa.statut==='termine')return;
  e.stopPropagation();
  pinDrag.pid=pid;pinDrag.moved=false;
  var s=e.touches?e.touches[0]:e;pinDrag.sx=s.clientX;pinDrag.sy=s.clientY;
  var el=document.getElementById('pin-'+pid);if(el)el.style.cursor='grabbing';
  document.addEventListener('mousemove',pinDragMove);
  document.addEventListener('mouseup',pinDragEnd);
  document.addEventListener('touchmove',pinDragMove,{passive:false});
  document.addEventListener('touchend',pinDragEnd);
}
function pinDragMove(e){
  if(!pinDrag.pid)return;e.preventDefault();
  var s=e.touches?e.touches[0]:e;
  if(Math.abs(s.clientX-pinDrag.sx)>4||Math.abs(s.clientY-pinDrag.sy)>4)pinDrag.moved=true;
  if(!pinDrag.moved)return;
  var box=document.getElementById('plan-box');if(!box)return;
  var rect=box.getBoundingClientRect();
  var el=document.getElementById('pin-'+pinDrag.pid);
  if(el){el.style.left=Math.min(100,Math.max(0,(s.clientX-rect.left)/rect.width*100))+'%';el.style.top=Math.min(100,Math.max(0,(s.clientY-rect.top)/rect.height*100))+'%';}
}
function pinDragEnd(e){
  if(!pinDrag.pid)return;
  document.removeEventListener('mousemove',pinDragMove);document.removeEventListener('mouseup',pinDragEnd);
  document.removeEventListener('touchmove',pinDragMove);document.removeEventListener('touchend',pinDragEnd);
  if(pinDrag.moved){
    var s=e.changedTouches?e.changedTouches[0]:e;
    var box=document.getElementById('plan-box');
    if(box){
      var rect=box.getBoundingClientRect();
      var x=parseFloat(Math.min(100,Math.max(0,(s.clientX-rect.left)/rect.width*100)).toFixed(1));
      var y=parseFloat(Math.min(100,Math.max(0,(s.clientY-rect.top)/rect.height*100)).toFixed(1));
      var p=postes.find(function(x){return x.id==pinDrag.pid;});
      if(p){p.x=x;p.y=y;db.from('postes').update({x:x,y:y}).eq('id',p.id).then(function(){});}
    }
  }
  var pid=pinDrag.pid;pinDrag.pid=null;
  if(pinDrag.moved){pinDrag.moved=false;openTerrain(curPassageId);}
}

// ═══ RÉSULTATS ═══
function dbUpdateRes(existing,data,passageId,posteId,cb){
  syncOn();
  if(existing){
    db.from('resultats_postes').update(data).eq('id',existing.id).then(function(r){
      if(!r.error)Object.assign(existing,data);
      syncOff();if(cb)cb();
    });
  } else {
    var insert=Object.assign({passage_id:passageId,poste_id:posteId,statut:null,note:'',produit:'',substance:'',conso:'',substance_autre:''},data);
    db.from('resultats_postes').insert(insert).select().single().then(function(r){
      if(r.data)resultats.push(r.data);
      syncOff();if(cb)cb();
    });
  }
}

function setStatut(pid,statut,passageId){
  var ex=gPosteRes(passageId,pid);
  var ns=ex&&ex.statut===statut?null:statut;
  dbUpdateRes(ex,{statut:ns},passageId,pid,function(){openTerrain(passageId);});
}
function setProduit(pid,produit,passageId){
  var ex=gPosteRes(passageId,pid);
  var np=ex&&ex.produit===produit?'':produit;
  dbUpdateRes(ex,{produit:np},passageId,pid,function(){openTerrain(passageId);});
}
function setSubstance(pid,sub,passageId){
  var ex=gPosteRes(passageId,pid);
  var ns=ex&&ex.substance===sub?'':sub;
  dbUpdateRes(ex,{substance:ns},passageId,pid,function(){openTerrain(passageId);});
}
function setSubstAutre(pid,val,passageId){
  var ex=gPosteRes(passageId,pid);
  dbUpdateRes(ex,{substance_autre:val},passageId,pid,null);
}
function setConso(pid,conso,passageId){
  var ex=gPosteRes(passageId,pid);
  var nc=ex&&ex.conso===conso?'':conso;
  dbUpdateRes(ex,{conso:nc},passageId,pid,function(){openTerrain(passageId);});
}
function setNote(pid,note,passageId){
  var ex=gPosteRes(passageId,pid);
  dbUpdateRes(ex,{note:note},passageId,pid,null);
}

async function terminer(passageId){
  var pa=passages.find(function(p){return p.id===passageId;});if(!pa)return;
  var actifs=gPassRes(passageId).filter(function(r){return r.statut==='actif';}).length;
  if(!confirm(actifs>0?'Terminer ? '+actifs+' poste(s) actif(s) !':'Terminer ce passage ?'))return;
  var notes=prompt('Notes de visite (optionnel) :')||'';;
  syncOn();
  await db.from('passages').update({statut:'termine',notes:notes}).eq('id',passageId);
  pa.statut='termine';pa.notes=notes;syncOff();
  toast(actifs>0?'⚠️ Passage terminé — '+actifs+' actif(s)':'✅ Passage terminé !');
  openTerrain(passageId);
}

function deletePoste(posteId,passageId){
  if(!confirm('Supprimer définitivement ce poste du parc ?'))return;
  syncOn();
  db.from('postes').delete().eq('id',posteId).then(function(){
    postes=postes.filter(function(p){return p.id!=posteId;});
    resultats=resultats.filter(function(r){return r.poste_id!=posteId;});
    openPinId=null;syncOff();toast('Poste supprimé');
    openTerrain(passageId);
  });
}


// ═══ TOOLTIP ═══
function showPinTip(e,el){
  hidePinTip();
  var tip=document.createElement('div');
  tip.id='pin-tip';tip.className='pin-tooltip';
  tip.textContent=el.getAttribute('data-tip');
  var box=document.getElementById('plan-box');
  if(!box)return;
  box.appendChild(tip);
  var rect=el.getBoundingClientRect();
  var boxRect=box.getBoundingClientRect();
  var x=rect.left-boxRect.left+rect.width/2;
  var y=rect.top-boxRect.top-10;
  tip.style.left=Math.max(0,x-tip.offsetWidth/2)+'px';
  tip.style.top=Math.max(0,y-tip.offsetHeight)+'px';
}
function hidePinTip(){var t=document.getElementById('pin-tip');if(t)t.remove();}

// ═══ SIGNATURE ═══
var sigCanvas=null,sigCtx=null,sigDrawing=false,sigData=null;

function openSignature(passageId){
  var pa=passages.find(function(p){return p.id===passageId;});
  if(!pa)return;
  var c=gcl(pa.client_id);

function initSigCanvas(){
  sigCanvas=document.getElementById('sig-canvas');
  if(!sigCanvas)return;
  sigCtx=sigCanvas.getContext('2d');
  sigCtx.strokeStyle='#1a1a1a';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  // Mouse
  sigCanvas.addEventListener('mousedown',function(e){sigDrawing=true;sigCtx.beginPath();var r=sigCanvas.getBoundingClientRect();sigCtx.moveTo(e.clientX-r.left,e.clientY-r.top);});
  sigCanvas.addEventListener('mousemove',function(e){if(!sigDrawing)return;var r=sigCanvas.getBoundingClientRect();sigCtx.lineTo(e.clientX-r.left,e.clientY-r.top);sigCtx.stroke();});
  sigCanvas.addEventListener('mouseup',function(){sigDrawing=false;});
  // Touch
  sigCanvas.addEventListener('touchstart',function(e){e.preventDefault();sigDrawing=true;sigCtx.beginPath();var r=sigCanvas.getBoundingClientRect();sigCtx.moveTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
  sigCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!sigDrawing)return;var r=sigCanvas.getBoundingClientRect();sigCtx.lineTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);sigCtx.stroke();},{passive:false});
  sigCanvas.addEventListener('touchend',function(){sigDrawing=false;});
}

function clearSig(){if(sigCtx&&sigCanvas)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);}

function saveSig(passageId){
  if(!sigCanvas)return;
  var imgData=sigCanvas.toDataURL('image/png');
  var blank=document.createElement('canvas');blank.width=sigCanvas.width;blank.height=sigCanvas.height;
  if(imgData===blank.toDataURL('image/png')){toast('⚠️ Veuillez signer avant de valider',true);return;}
  var sigNom=(document.getElementById('sig-nom')||{}).value||'';
  sigData=imgData;
  var pa=passages.find(function(p){return p.id===passageId;});
  if(!pa)return;
  syncOn();
  db.from('passages').update({signature:imgData,signataire:sigNom}).eq('id',passageId).then(function(){
    pa.signature=imgData;pa.signataire=sigNom;syncOff();
    toast('✓ Signature enregistrée !');
    openTerrain(passageId);
  });
}

function handlePhoto(e,contratId,nom,planId){
  var file=e.target.files[0];if(!file)return;
  if(file.type==='application/pdf'){
    handlePDFPlan(file,contratId,nom,planId);
    e.target.value='';return;
  }
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var r=Math.min(1,1400/img.width);
      var cv=document.createElement('canvas');
      cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      var data=cv.toDataURL('image/jpeg',0.7);
      pendingPlan={data:data,contratId:contratId,planId:planId,nom:nom};
      document.getElementById('cfm-img').src=data;
      document.getElementById('cfm-sub').textContent='Niveau : '+nom;
      document.getElementById('cfm-bg').classList.add('on');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);e.target.value='';
}

function handlePDFPlan(file,contratId,nom,planId){
  toast('⏳ Conversion du PDF...');
  var reader=new FileReader();
  reader.onload=function(ev){
    var typedArray=new Uint8Array(ev.target.result);
    // Set worker src
    if(window.pdfjsLib){
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfjsLib.getDocument({data:typedArray}).promise.then(function(pdf){
        pdf.getPage(1).then(function(page){
          var scale=2.0;
          var viewport=page.getViewport({scale:scale});
          var cv=document.createElement('canvas');
          cv.width=viewport.width;cv.height=viewport.height;
          var ctx=cv.getContext('2d');
          page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){
            var data=cv.toDataURL('image/jpeg',0.8);
            pendingPlan={data:data,contratId:contratId,planId:planId,nom:nom};
            document.getElementById('cfm-img').src=data;
            document.getElementById('cfm-sub').textContent='PDF → '+nom+' (page 1)';
            document.getElementById('cfm-bg').classList.add('on');
          });
        });
      }).catch(function(err){toast('⚠️ Erreur lecture PDF : '+err.message,true);});
    } else {
      toast('⚠️ Module PDF non disponible',true);
    }
  };
  reader.readAsArrayBuffer(file);
}

function toggleHeatmap(passageId){

function drawHeatmap(passageId){
  var cv=document.getElementById('hm-cv');if(!cv)return;
  var box=document.getElementById('plan-box');if(!box)return;
  var img=box.querySelector('img');if(!img)return;
  cv.width=img.offsetWidth||600;cv.height=img.offsetHeight||400;
  var ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
  var planPostes=gPlanPostes(curPlanId||0);
  var res=gPassRes(passageId);
  // Get history for intensity boost
  var pa=passages.find(function(p){return p.id===passageId;});
  var allPassages=pa?gContratPassages(pa.contrat_id).slice(0,5):[];

  planPostes.forEach(function(p){
    var r=res.find(function(x){return x.poste_id===p.id;});
    var intensity=0;var color=[100,100,100];
    if(r){
      if(r.statut==='actif'){color=[230,48,48];intensity=0.9;}
      else if(r.statut==='remplace'){color=[249,115,22];intensity=0.65;}
      else if(r.statut==='ok'){color=[46,168,74];intensity=0.35;}
      else if(r.statut==='absent'){color=[100,100,100];intensity=0.25;}
      if(r.conso){var c=parseInt(r.conso)||0;intensity=Math.min(1,intensity+(c/100)*0.35);}
    }
    // Boost intensity based on historical activity
    allPassages.forEach(function(prevPa){
      if(prevPa.id===passageId)return;
      var prevRes=gPosteRes(prevPa.id,p.id);
      if(prevRes&&prevRes.statut==='actif')intensity=Math.min(1,intensity+0.1);
    });
    if(intensity<0.1)return;
    var px=p.x/100*cv.width;var py=p.y/100*cv.height;
    var radius=Math.min(cv.width,cv.height)*0.09;
    var grad=ctx.createRadialGradient(px,py,0,px,py,radius);
    grad.addColorStop(0,'rgba('+color[0]+','+color[1]+','+color[2]+','+(intensity*0.9)+')');
    grad.addColorStop(0.45,'rgba('+color[0]+','+color[1]+','+color[2]+','+(intensity*0.5)+')');
    grad.addColorStop(1,'rgba('+color[0]+','+color[1]+','+color[2]+',0)');
    ctx.beginPath();ctx.arc(px,py,radius,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
  });
}

// ═══ PDF ═══
function exportPDF(passageId){
  var jsPDF=window.jspdf?window.jspdf.jsPDF:null;
  if(!jsPDF){toast('PDF non disponible',true);return;}
  var pa=passages.find(function(p){return p.id===passageId;});if(!pa)return;
  var c=gcl(pa.client_id);
  var ctr=gct(pa.contrat_id)||{nom:'',type:'',date_debut:'',date_fin:''};
  var allPostes=gContratPostes(pa.contrat_id);
  var res=gPassRes(passageId);
  var ok=res.filter(function(r){return r.statut==='ok';}).length;
  var actif=res.filter(function(r){return r.statut==='actif';}).length;
  var remplace=res.filter(function(r){return r.statut==='remplace';}).length;
  var absent=res.filter(function(r){return r.statut==='absent';}).length;
  var nbPlacebo=res.filter(function(r){return r.produit==='placebo';}).length;
  var nbToxique=res.filter(function(r){return r.produit==='toxique';}).length;
  var nbCapture=res.filter(function(r){return r.produit==='capture';}).length;
  var nbAvec=nbPlacebo+nbToxique+nbCapture;
  var pctP=nbAvec?Math.round(nbPlacebo/nbAvec*100):0;
  var pctT=nbAvec?Math.round(nbToxique/nbAvec*100):0;
  var pctC=nbAvec?Math.round(nbCapture/nbAvec*100):0;
  var resConso=res.filter(function(r){return r.conso;});
  var consoMoy=resConso.length?Math.round(resConso.reduce(function(s,r){return s+parseInt(r.conso||0);},0)/resConso.length):0;
  var substUsed={};
  res.filter(function(r){return r.substance;}).forEach(function(r){
    var k=r.substance==='autre'?(r.substance_autre||'Autre'):r.substance;
    substUsed[k]=(substUsed[k]||0)+1;
  });
  // Prochain passage
  var nextPassage='';
  if(ctr.date_debut&&ctr.type){
    var lastDate=new Date(pa.date_passage);
    var freqMap={annuel:365,mensuel:30,trimestriel:90,ponctuel:0};
    var days=freqMap[ctr.type]||90;
    if(days>0){
      lastDate.setDate(lastDate.getDate()+days);
      nextPassage=fdate(lastDate.toISOString().split('T')[0]);
    }
  }

  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=210,M=15;

  // ═══════════════════════════
  // PAGE 1 — EN-TÊTE + RÉSUMÉ
  // ═══════════════════════════
  // Bande rouge haut
  doc.setFillColor(230,48,48);doc.rect(0,0,W,35,'F');
  // Logo
  try{doc.addImage(LOGO,'JPEG',M,4,26,26);}catch(e){}
  // SGF infos
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('SGF NUISIBLES',M+30,13);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(255,200,200);
  doc.text('Stop Guêpes-Frelons et Nuisibles',M+30,18);
  doc.text('215 Montée des Pierres — 38730 Chélieu',M+30,23);
  doc.text('contact@sgfnuisibles.fr',M+30,28);
  // Client (droite)
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  doc.text(c.nom,W-M,13,{align:'right'});
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(255,200,200);
  if(c.adresse)doc.text(c.adresse,W-M,18,{align:'right'});
  if(c.tel)doc.text(c.tel,W-M,23,{align:'right'});
  if(c.email)doc.text(c.email,W-M,28,{align:'right'});

  // Titre rapport
  doc.setFillColor(248,248,248);doc.rect(0,35,W,20,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(230,48,48);
  doc.text('Rapport du '+fdate(pa.date_passage),M,48);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,120,120);
  doc.text('Contrat : '+ctr.nom+' ('+ctr.type+')',M,53);
  doc.text('Intervenant : Christophe Pons',W-M,48,{align:'right'});
  //if(nextPassage)doc.text('Prochain passage prévu : '+nextPassage,W-M,53,{align:'right'});
  doc.setFillColor(230,48,48);doc.rect(0,55,W,0.5,'F');

  var y=63;

  // KPIs
  var kpis=[
    {l:'Sain',v:ok,bg:[236,253,243],bc:[46,168,74],c:[46,168,74]},
    {l:'Consommé',v:actif,bg:[255,237,237],bc:[230,48,48],c:[230,48,48]},
    {l:'Ré-alimenté',v:remplace,bg:[255,247,235],bc:[249,115,22],c:[249,115,22]},
    {l:'Absents',v:absent,bg:[248,248,248],bc:[180,180,180],c:[120,120,120]},
    {l:'Total',v:allPostes.length,bg:[240,244,255],bc:[80,100,200],c:[80,100,200]}
  ];
  var bW=(W-M*2-16)/5;
  kpis.forEach(function(k,i){
    var x=M+i*(bW+4);
    doc.setFillColor(k.bg[0],k.bg[1],k.bg[2]);
    doc.roundedRect(x,y,bW,22,2,2,'F');
    doc.setDrawColor(k.bc[0],k.bc[1],k.bc[2]);doc.setLineWidth(0.5);
    doc.roundedRect(x,y,bW,22,2,2,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(20);
    doc.setTextColor(k.c[0],k.c[1],k.c[2]);
    doc.text(String(k.v),x+bW/2,y+14,{align:'center'});
    doc.setFontSize(7);doc.setTextColor(120,120,120);doc.setFont('helvetica','normal');
    doc.text(k.l,x+bW/2,y+20,{align:'center'});
  });
  y+=28;

  // Appâts + conso
  doc.setFillColor(250,250,250);doc.roundedRect(M,y,W-M*2,30,2,2,'F');
  doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);doc.roundedRect(M,y,W-M*2,30,2,2,'S');
  // Titre
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(60,60,60);
  doc.text('RÉPARTITION DES APPÂTS',M+3,y+7);
  // Barre
  var barX=M+3,barW2=W-M*2-70,barH=6;
  doc.setFillColor(230,230,230);doc.roundedRect(barX,y+10,barW2,barH,1,1,'F');
  var bx2=barX;
  if(pctP>0){var bw2=barW2*pctP/100;doc.setFillColor(59,130,246);doc.rect(bx2,y+10,bw2,barH,'F');bx2+=bw2;}
  if(pctT>0){var bw2=barW2*pctT/100;doc.setFillColor(230,48,48);doc.rect(bx2,y+10,bw2,barH,'F');bx2+=bw2;}
  if(pctC>0){var bw2=barW2*pctC/100;doc.setFillColor(249,115,22);doc.rect(bx2,y+10,bw2,barH,'F');}
  // Légende
  var lx2=barX;
  [{l:'Placebo '+pctP+'% ('+nbPlacebo+')',c:[59,130,246]},{l:'Toxique '+pctT+'% ('+nbToxique+')',c:[230,48,48]},{l:'Capture '+pctC+'% ('+nbCapture+')',c:[249,115,22]}].forEach(function(b){
    doc.setFillColor(b.c[0],b.c[1],b.c[2]);doc.circle(lx2+1.5,y+22,1.5,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(60,60,60);
    doc.text(b.l,lx2+4.5,y+23);lx2+=55;
  });
  // Conso moy (right)
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(120,120,120);
  doc.text('Conso moy.',W-M-35,y+12);
  doc.setFontSize(20);doc.setTextColor(consoMoy>75?230:consoMoy>40?249:46,consoMoy>75?48:consoMoy>40?115:168,consoMoy>75?48:consoMoy>40?22:74);
  doc.text(consoMoy+'%',W-M-20,y+24,{align:'center'});
  y+=36;

  // Substances
  if(Object.keys(substUsed).length>0){
    doc.setFillColor(255,245,245);doc.roundedRect(M,y,W-M*2,10,2,2,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(230,48,48);
    doc.text('Substances actives : ',M+3,y+6);
    doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    doc.text(Object.keys(substUsed).map(function(k){return k+' ('+substUsed[k]+' poste'+(substUsed[k]>1?'s':'')+')';}).join('   ·   '),M+38,y+6);
    y+=14;
  }

  // Comparatif passages
  var prevPas=gContratPassages(pa.contrat_id).filter(function(p){return p.statut==='termine'&&p.id!==passageId;}).slice(0,4);
  if(prevPas.length>0){
    doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(60,60,60);
    doc.text('ÉVOLUTION DES PASSAGES',M,y);y+=4;
    var compRows=[];
    compRows.push([fdate(pa.date_passage)+' (actuel)',String(ok),String(actif),consoMoy+'%',String(nbToxique),String(nbPlacebo)]);
    prevPas.forEach(function(prev){
      var pr=gPassRes(prev.id);
      var pok=pr.filter(function(r){return r.statut==='ok';}).length;
      var pact=pr.filter(function(r){return r.statut==='actif';}).length;
      var pc=pr.filter(function(r){return r.conso;});
      var pcm=pc.length?Math.round(pc.reduce(function(s,r){return s+parseInt(r.conso||0);},0)/pc.length):0;
      compRows.push([fdate(prev.date_passage),String(pok),String(pact),pcm+'%',String(pr.filter(function(r){return r.produit==='toxique';}).length),String(pr.filter(function(r){return r.produit==='placebo';}).length)]);
    });
    doc.autoTable({startY:y,
      head:[['Passage','Sain','Consommé','Conso moy.','Toxique','Placebo']],
      body:compRows,theme:'plain',
      styles:{font:'helvetica',fontSize:8,cellPadding:{top:3,right:3,bottom:3,left:3},textColor:[40,40,40],fillColor:[255,255,255],lineColor:[220,220,220],lineWidth:0.3},
      headStyles:{fillColor:[248,248,248],textColor:[120,120,120],fontStyle:'bold',fontSize:7.5},
      alternateRowStyles:{fillColor:[252,252,252]},
      columnStyles:{0:{cellWidth:52,fontStyle:'bold'},1:{cellWidth:18},2:{cellWidth:18},3:{cellWidth:26},4:{cellWidth:22},5:{cellWidth:22}},
      didDrawCell:function(data){
        if(data.section==='body'&&data.row.index===0){
          doc.setFont('helvetica','bold');
        }
      },
      margin:{left:M,right:M}});
    y=doc.lastAutoTable.finalY+8;
  }

  // Notes
  if(pa.notes){
    doc.setFillColor(255,248,248);doc.roundedRect(M,y,W-M*2,18,2,2,'F');
    doc.setDrawColor(230,48,48);doc.setLineWidth(0.3);doc.roundedRect(M,y,W-M*2,18,2,2,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(230,48,48);
    doc.text('Commentaires :',M+3,y+6);
    doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
    doc.text(doc.splitTextToSize(pa.notes,W-M*2-6),M+3,y+12);
    y+=22;
  }

  // ═══════════════════════════
  // PAGES PLANS
  // ═══════════════════════════
  var cPlans=gContratPlans(pa.contrat_id).filter(function(p){return p.image_data;});
  var prevPassages=gContratPassages(pa.contrat_id).filter(function(p){return p.statut==='termine';}).slice(0,5);
  var subl={difenacoum:'Difenacoum',bromadiolone:'Bromadiolone',brodifacoum:'Brodifacoum',chlorophacinone:'Chlorophacinone'};
  var pl={placebo:'Placebo',toxique:'Toxique',capture:'Capture',aucun:'Aucun'};
  var sl={sain:'Sain',consomme:'Consommé',realimente:'Ré-alimenté',manquant:'Manquant',controle:'Contrôlé'};

  cPlans.forEach(function(plan){
    doc.addPage();
    // Header
    doc.setFillColor(230,48,48);doc.rect(0,0,W,10,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
    doc.text('Plan — '+plan.nom,M,7);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(255,200,200);
    doc.text(c.nom+' · '+fdate(pa.date_passage),W-M,7,{align:'right'});

    var planPostes=gPlanPostes(plan.id);
    var imgW=W-M*2;

    // Canvas: plan + heatmap + pins
    var cv=document.createElement('canvas');
    var drawImg=document.querySelector('#plan-box img');
    var ratio=0.65;
    if(drawImg&&drawImg.naturalWidth>0&&plan.id===curPlanId){
      ratio=drawImg.naturalHeight/drawImg.naturalWidth;
    }
    cv.width=900;cv.height=Math.round(900*ratio);
    var ctx=cv.getContext('2d');
    // White bg
    ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,cv.width,cv.height);
    // Draw plan avec attente chargement
    try{
      var src=plan.image_data;
      await new Promise(function(resolve){
        var tmpImg=new Image();
        tmpImg.onload=function(){ctx.drawImage(tmpImg,0,0,cv.width,cv.height);resolve();}
        tmpImg.onerror=function(){resolve();}
        tmpImg.src=src;
        if(tmpImg.complete&&tmpImg.naturalWidth>0){ctx.drawImage(tmpImg,0,0,cv.width,cv.height);resolve();}
      });
    }catch(e){}
    // Heatmap
    planPostes.forEach(function(p){
      var r=res.find(function(x){return x.poste_id===p.id;});
      var intensity=0;var color=[100,100,100];
      if(r){
        if(r.statut==='consomme'){color=[249,115,22];intensity=0.75;}
        else if(r.statut==='manquant'){color=[230,48,48];intensity=0.8;}
        else if(r.statut==='realimente'){color=[59,130,246];intensity=0.5;}
        else if(r.statut==='sain'){color=[46,168,74];intensity=0.2;}
        if(r.conso)intensity=Math.min(1,intensity+parseInt(r.conso||0)/100*0.3);
      }
      prevPassages.forEach(function(prev){
        if(prev.id===passageId)return;
        var pr=gPosteRes(prev.id,p.id);
        if(pr&&pr.statut==='actif')intensity=Math.min(1,intensity+0.08);
      });
      if(intensity<0.08)return;
      var px=p.x/100*cv.width;var py=p.y/100*cv.height;
      var radius=Math.min(cv.width,cv.height)*0.09;
      var grad=ctx.createRadialGradient(px,py,0,px,py,radius);
      grad.addColorStop(0,'rgba('+color[0]+','+color[1]+','+color[2]+','+intensity*0.7+')');
      grad.addColorStop(0.5,'rgba('+color[0]+','+color[1]+','+color[2]+','+intensity*0.35+')');
      grad.addColorStop(1,'rgba('+color[0]+','+color[1]+','+color[2]+',0)');
      ctx.beginPath();ctx.arc(px,py,radius,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    });
    // Pins
    planPostes.forEach(function(p){
      var r=res.find(function(x){return x.poste_id===p.id;});
      var s=r?r.statut:null;
      var cols={sain:[46,168,74],consomme:[249,115,22],realimente:[59,130,246],manquant:[230,48,48],controle:[138,148,136]};
      var fc=cols[s]||[100,100,100];
      var px=p.x/100*cv.width;var py=p.y/100*cv.height;
      var rad=Math.max(16,cv.width*0.02);
      ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
      ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);
      ctx.fillStyle='rgb('+fc[0]+','+fc[1]+','+fc[2]+')';ctx.fill();
      ctx.strokeStyle='#ffffff';ctx.lineWidth=3;ctx.stroke();
      ctx.shadowColor='transparent';
      ctx.fillStyle='#ffffff';
      ctx.font='bold '+Math.round(rad*0.75)+'px Arial';
      ctx.textAlign='center';ctx.textBaseline='middle';
      var lbl=ptype.label.substring(0,2).toUpperCase();
      ctx.fillText(lbl,px,py);
    });

    // Add to PDF
    var pdfH=Math.min(145,Math.round(imgW*ratio));
    try{doc.addImage(cv.toDataURL('image/jpeg',0.9),'JPEG',M,13,imgW,pdfH);}catch(e){}

    var ly=13+pdfH+5;
    // Legend
    [{l:'Sain',c:[46,168,74]},{l:'Consommé',c:[230,48,48]},{l:'Ré-alimenté',c:[249,115,22]},{l:'Absent',c:[150,150,150]},{l:'Non vérifié',c:[100,100,100]}].forEach(function(li,i){
      doc.setFillColor(li.c[0],li.c[1],li.c[2]);doc.circle(M+i*28+2,ly,2,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(80,80,80);
      doc.text(li.l,M+i*28+5.5,ly+0.8);
    });
    doc.setFont('helvetica','italic');doc.setFontSize(6.5);doc.setTextColor(180,180,180);
    doc.text('Heatmap : activité cumulée sur les passages précédents',W-M,ly+0.8,{align:'right'});
    ly+=7;

    // Poste table
    if(planPostes.length>0){
      var pRows=planPostes.map(function(p){
        var r=res.find(function(x){return x.poste_id===p.id;});
        var sub='—';
        if(r&&r.produit==='toxique')sub=subl[r.substance]||r.substance||'—';
        return[p.label,p.zone||'—',r?sl[r.statut]||'—':'Non vér.',r&&r.produit?pl[r.produit]||r.produit:'—',sub,r&&r.conso?r.conso+'%':'—',r?r.note||'':''];
      });
      doc.autoTable({startY:ly,
        head:[['Poste','Zone','Statut','Produit','Substance','Conso','Note']],
        body:pRows,theme:'plain',
        styles:{font:'helvetica',fontSize:7.5,cellPadding:{top:2.5,right:2,bottom:2.5,left:2},textColor:[40,40,40],fillColor:[255,255,255],lineColor:[220,220,220],lineWidth:0.3},
        headStyles:{fillColor:[248,248,248],textColor:[120,120,120],fontStyle:'bold',fontSize:7},
        alternateRowStyles:{fillColor:[252,252,252]},
        columnStyles:{0:{cellWidth:22},1:{cellWidth:22},2:{cellWidth:22},3:{cellWidth:20},4:{cellWidth:26},5:{cellWidth:14},6:{cellWidth:60}},
        didDrawCell:function(data){
          if(data.section==='body'&&data.column.index===2){
            var c2={Sain:[46,168,74],Consomme:[249,115,22],'Re-alimente':[59,130,246],Manquant:[230,48,48],Controle:[138,148,136],'Consommé':[249,115,22],'Ré-alimenté':[59,130,246]};
            var col=c2[data.cell.raw];
            if(col){doc.setTextColor(col[0],col[1],col[2]);doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.text(data.cell.raw,data.cell.x+data.cell.padding('left'),data.cell.y+data.cell.height/2+2.5);}
          }
        },
        margin:{left:M,right:M}});
    }
  });

  // ═══════════════════════════
  // PAGE DÉTAIL POSTES
  // ═══════════════════════════
  doc.addPage();
  doc.setFillColor(230,48,48);doc.rect(0,0,W,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  doc.text('Détail des postes — '+c.nom,M,7);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(255,200,200);
  doc.text(fdate(pa.date_passage),W-M,7,{align:'right'});

  var zones={};
  allPostes.forEach(function(p){var z=p.zone||'Général';if(!zones[z])zones[z]=[];zones[z].push(p);});
  var gy=14;

  Object.keys(zones).forEach(function(zone){
    var zp=zones[zone];
    // Zone header
    if(gy>255){doc.addPage();gy=14;}
    doc.setFillColor(240,240,240);doc.rect(M,gy,W-M*2,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(60,60,60);
    doc.text('Zone : '+zone,M+3,gy+5);
    gy+=9;

    // Postes 2 per row like Stann
    var col=0;var rowH=28;
    zp.forEach(function(p){
      var r=res.find(function(x){return x.poste_id===p.id;});
      var s=r?r.statut:null;
      var ptype=pt(p.type_id);
      var x=col===0?M:M+(W-M*2)/2+2;
      var cardW=(W-M*2)/2-2;
      if(gy+rowH>280){doc.addPage();gy=14;}
      // Card bg
      var bgc={ok:[236,253,243],actif:[255,237,237],remplace:[255,247,235],absent:[248,248,248]};
      var bdc={ok:[46,168,74],actif:[230,48,48],remplace:[249,115,22],absent:[200,200,200]};
      var bg=bgc[s]||[252,252,252];var bd=bdc[s]||[220,220,220];
      doc.setFillColor(bg[0],bg[1],bg[2]);doc.roundedRect(x,gy,cardW,rowH,2,2,'F');
      doc.setDrawColor(bd[0],bd[1],bd[2]);doc.setLineWidth(0.4);doc.roundedRect(x,gy,cardW,rowH,2,2,'S');
      // Poste title + type
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(40,40,40);
      doc.text(p.label,x+3,gy+6);
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(120,120,120);
      doc.text(ptype.label,x+3,gy+11);
      // Statut badge
      var sc={ok:[46,168,74],actif:[230,48,48],remplace:[249,115,22],absent:[150,150,150]};
      var sl2={ok:'OK',actif:'ACTIF',remplace:'REMPLACÉ',absent:'ABSENT'};
      if(s){
        var sc2=sc[s]||[150,150,150];
        doc.setFillColor(sc2[0],sc2[1],sc2[2]);
        doc.roundedRect(x+cardW-25,gy+2,23,6,1,1,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(255,255,255);
        doc.text(sl2[s]||s,x+cardW-13.5,gy+6.5,{align:'center'});
      }
      // Separator
      doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.line(x+2,gy+13,x+cardW-2,gy+13);
      // Details
      var dy=gy+18;
      if(r&&r.produit){

function emailPassage(passageId){
  var pa=passages.find(function(p){return p.id===passageId;});if(!pa)return;
  var c=gcl(pa.client_id);var ctr=gct(pa.contrat_id)||{nom:''};
  var cContacts=contacts.filter(function(x){return x.client_id===pa.client_id;});
  var to=(cContacts.find(function(x){return x.principal;})||cContacts[0]||{email:''}).email||c.email||'';
  var res=gPassRes(passageId);
  var ok=res.filter(function(r){return r.statut==='ok';}).length;
  var actif=res.filter(function(r){return r.statut==='actif';}).length;
  var absent=res.filter(function(r){return r.statut==='absent';}).length;
  var resConso=res.filter(function(r){return r.conso;});
  var consoMoy=resConso.length?Math.round(resConso.reduce(function(s,r){return s+parseInt(r.conso||0);},0)/resConso.length):0;
  var subject='Rapport de visite - '+c.nom+' - '+fdate(pa.date_passage).replace(/\//g,'-');
  var lines=[
    'Bonjour,','',
    'Veuillez trouver en pièce jointe le rapport de notre visite du '+fdate(pa.date_passage)+'.',
    '','Contrat : '+ctr.nom,'',
    'Résumé :',
    '- Postes OK : '+ok,
    '- Postes actifs : '+actif,
    '- Postes absents : '+absent,
    '- Consommation moyenne : '+consoMoy+'%',''
  ];
  if(pa.notes)lines.push('Notes : '+pa.notes,'');
  lines.push('Cordialement,','Christophe Pons','SGF Nuisibles','contact@sgfnuisibles.fr');
  // Télécharger le PDF d'abord
  exportPDF(passageId);
  // Ouvrir le client mail après 1.5s
  setTimeout(function(){
    var mailUrl='mailto:'+to+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(lines.join('\n'));
    window.location.href=mailUrl;
    toast('📎 Joignez le PDF avant d\'envoyer');
  },1500);
}
