function renderFacturation(){
  document.getElementById('topbar-act').innerHTML='<button class="btn btn-r btn-sm" onclick="modalEcheance()">+ Échéance</button>';

  // Stats
  var today=new Date();
  var enRetard=echeancier.filter(function(e){return e.statut!=='paye'&&e.date_echeance&&new Date(e.date_echeance)<today;});
  var urgent=echeancier.filter(function(e){
    if(e.statut==='paye')return false;
    var d=new Date(e.date_echeance);var diff=(d-today)/(1000*60*60*24);
    return diff>=0&&diff<=15;
  });
  var paye=echeancier.filter(function(e){return e.statut==='paye';});
  var totalCA=contrats.reduce(function(s,c){return s+(c.montant_annuel||0);},0);
  var totalPaye=echeancier.filter(function(e){return e.statut==='paye';}).reduce(function(s,e){return s+(e.montant||0);},0);
  var totalAttendu=echeancier.reduce(function(s,e){return s+(e.montant||0);},0);

  var h='';

  // KPIs
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px">';
  h+='<div style="background:#fff;border:1px solid var(--bord);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
  h+='<div style="font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">CA Annuel</div>';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--acc2)">'+totalCA.toLocaleString('fr-FR')+'€</div></div>';
  h+='<div style="background:#fff;border:1px solid var(--bord);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
  h+='<div style="font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Encaissé</div>';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--acc2)">'+totalPaye.toLocaleString('fr-FR')+'€</div></div>';
  h+='<div style="background:'+(enRetard.length>0?'#fff5f5':'#fff')+';border:1px solid '+(enRetard.length>0?'rgba(230,48,48,.3)':'var(--bord)')+';border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
  h+='<div style="font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">En retard</div>';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:'+(enRetard.length>0?'var(--acc)':'var(--tx3)')+'">'+enRetard.length+'</div></div>';
  h+='<div style="background:'+(urgent.length>0?'#fffaf0':'#fff')+';border:1px solid '+(urgent.length>0?'rgba(249,115,22,.3)':'var(--bord)')+';border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
  h+='<div style="font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Urgentes</div>';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:'+(urgent.length>0?'var(--ora)':'var(--tx3)')+'">'+urgent.length+'</div></div>';
  h+='</div>';

  // Alertes en retard
  if(enRetard.length>0){
    h+='<div style="background:#fff5f5;border:1px solid rgba(230,48,48,.2);border-radius:12px;padding:14px;margin-bottom:16px">';
    h+='<div style="font-weight:700;font-size:13px;color:var(--acc);margin-bottom:8px">🔴 Échéances en retard</div>';
    enRetard.forEach(function(e){
      var c=gcl(e.client_id);
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(230,48,48,.1)">';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+c.nom+'</div>';
      h+='<div style="font-size:11px;color:var(--tx3)">'+e.echeance+' · '+fdate(e.date_echeance)+'</div></div>';
      h+='<div style="font-weight:700;color:var(--acc)">'+e.montant+'€</div>';
      h+='<button class="btn btn-sm" style="background:rgba(46,168,74,.1);color:var(--acc2);border:1px solid rgba(46,168,74,.2)" data-fn="markPaye" data-eid="'+e.id+'">✓ Payé</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Tableau complet
  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  h+='<th>Client</th><th>Échéance</th><th>Date</th><th>Montant</th><th>Statut</th><th>Actions</th>';
  h+='</tr></thead><tbody>';

  var sorted=echeancier.slice().sort(function(a,b){
    if(a.statut==='paye'&&b.statut!=='paye')return 1;
    if(a.statut!=='paye'&&b.statut==='paye')return-1;
    return new Date(a.date_echeance)-new Date(b.date_echeance);
  });

  if(sorted.length===0){
    h+='<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--tx3)">Aucune échéance — importez vos données ou ajoutez manuellement</td></tr>';
  } else {
    sorted.forEach(function(e){
      var c=gcl(e.client_id);
      var diff=e.date_echeance?(new Date(e.date_echeance)-new Date())/(1000*60*60*24):999;
      var alerte='';
      if(e.statut!=='paye'){
        if(diff<0)alerte='<span style="color:var(--acc);font-size:11px;font-weight:700">🔴 En retard</span>';

        else if(diff<=30)alerte='<span style="color:var(--yel);font-size:11px">🟡 Bientôt</span>';
        else alerte='<span style="color:var(--acc2);font-size:11px">🟢 OK</span>';
      }
      var statutBadge='';
      if(e.statut==='paye')statutBadge='<span style="background:rgba(46,168,74,.1);color:var(--acc2);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">✅ Payé</span>';
      else if(e.statut==='impaye')statutBadge='<span style="background:rgba(230,48,48,.1);color:var(--acc);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">❌ Impayé</span>';
      else statutBadge='<span style="background:rgba(240,180,41,.1);color:var(--yel);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">⏳ En attente</span>';
      h+='<tr>';
      h+='<td><strong>'+c.nom+'</strong><br><span style="font-size:11px;color:var(--tx3)">'+(e.num_contrat||'')+'</span></td>';
      h+='<td style="font-weight:600">'+e.echeance+'</td>';
      h+='<td>'+fdate(e.date_echeance)+'<br>'+alerte+'</td>';
      h+='<td style="font-weight:700;font-family:DM Mono,monospace">'+(e.montant||'—')+'€</td>';
      h+=statutBadge;
      h+='<td style="white-space:nowrap">';
      if(e.statut!=='paye')h+='<button class="btn btn-sm" style="background:rgba(46,168,74,.1);color:var(--acc2);border:1px solid rgba(46,168,74,.2);margin-right:4px" data-fn="markPaye" data-eid="'+e.id+'">✓ Payé</button>';
      h+='<button class="btn btn-g btn-xs" data-fn="deleteEch" data-eid="'+e.id+'">🗑️</button>';
      h+='</td></tr>';
    });
  }
  h+='</tbody></table></div>';

  document.getElementById('page').innerHTML=h;

  // Event delegation
  document.getElementById('page').onclick=function(ev){
    var btn=ev.target.closest('[data-action]');
    if(!btn)return;
    var action=btn.getAttribute('data-fn')||btn.getAttribute('data-action');
    var eid=parseInt(btn.getAttribute('data-eid'));
    if(action==='markPaye')markEcheancePaye(eid);
    else if(action==='deleteEch')deleteEcheance(eid);
  };
}

function markEcheancePaye(eid){
  var e=echeancier.find(function(x){return x.id===eid;});if(!e)return;
  syncOn();
  db.from('echeancier').update({statut:'paye',date_facture:new Date().toISOString().split('T')[0]}).eq('id',eid).then(function(){
    e.statut='paye';e.date_facture=new Date().toISOString().split('T')[0];
    syncOff();toast('✅ Échéance marquée payée !');renderFacturation();
  });

  document.getElementById('modal-bg').classList.add('on');
}

function saveContrat(cid){
  var nom=document.getElementById('f-ctn').value.trim();
  if(!nom){toast('⚠️ Nom obligatoire',true);return;}
  var data={client_id:cid,nom:nom,type:document.getElementById('f-ctt').value,date_debut:document.getElementById('f-ctd').value,date_fin:document.getElementById('f-ctf').value,statut:'actif',notes:document.getElementById('f-ctnotes').value};
  syncOn();
  db.from('contrats').insert(data).select().single().then(function(r){
    syncOff();
    if(r.error){toast('⚠️ Erreur',true);return;}
    contrats.push(r.data);toast('✓ Contrat créé');closeModal();openClientDrw(cid);
  });
}

function deleteContrat(ctid,cid){
  if(!confirm('Supprimer ce contrat et tous ses passages ?'))return;
  syncOn();
  var passIds=passages.filter(function(p){return p.contrat_id===ctid;}).map(function(p){return p.id;});
  var chain=Promise.resolve();
  if(passIds.length>0){
    chain=chain
      .then(function(){return db.from('resultats_postes').delete().in('passage_id',passIds);})
      .then(function(){return db.from('passages').delete().in('id',passIds);});
  }
  chain
    .then(function(){return db.from('postes').delete().eq('contrat_id',ctid);})
    .then(function(){return db.from('contrats').delete().eq('id',ctid);})
    .then(function(){
      contrats=contrats.filter(function(c){return c.id!==ctid;});
      passages=passages.filter(function(p){return p.contrat_id!==ctid;});
      resultats=resultats.filter(function(r){return passIds.indexOf(r.passage_id)<0;});
      postes=postes.filter(function(p){return p.contrat_id!==ctid;});
      syncOff();toast('Contrat supprimé');openClientDrw(cid);
    });
}

// ═══ DRAWER / MODAL ═══
function openDrw(title,html){
  document.getElementById('dh-title').textContent=title;
  document.getElementById('drw-body').innerHTML=html;
  document.getElementById('drw-bg').classList.add('on');
}
function closeDrw(){document.getElementById('drw-bg').classList.remove('on');}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}

// EXPORT EXCEL — SAUVEGARDE DONNÉES
// ═══════════════════════════════════════════
function exportAllData(){
  if(!window.XLSX){toast('⚠️ Module Excel non disponible',true);return;}
  toast('⏳ Génération de la sauvegarde...');
  var wb=XLSX.utils.book_new();

  // Feuille Clients
  var clientsData=[['ID','Nom','Type','Téléphone','Email','Adresse','Notes']];
  clients.forEach(function(c){
    clientsData.push([c.id,c.nom,c.type||'',c.tel||'',c.email||'',c.adresse||'',c.notes||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(clientsData),'Clients');

  // Feuille Contrats
  var contratsData=[['ID','Client','Nom contrat','Type','Date début','Date fin','Statut','Montant annuel','Fréquence']];
  contrats.forEach(function(ct){
    var c=gcl(ct.client_id);
    contratsData.push([ct.id,c.nom,ct.nom,ct.type||'',ct.date_debut||'',ct.date_fin||'',ct.statut||'',ct.montant_annuel||'',ct.frequence||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(contratsData),'Contrats');

  // Feuille Passages
  var passagesData=[['ID','Client','Contrat','Date','Statut','Notes']];
  passages.forEach(function(pa){
    var c=gcl(pa.client_id);
    var ctr=gct(pa.contrat_id)||{nom:''};
    passagesData.push([pa.id,c.nom,ctr.nom,pa.date_passage||'',pa.statut||'',pa.notes||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(passagesData),'Passages');

  // Feuille Postes
  var postesData=[['ID','Client','Contrat','Label','Zone','Type','Photo']];
  postes.forEach(function(p){
    var c=gcl(p.client_id);
    var ctr=gct(p.contrat_id)||{nom:''};
    var ptype=pt(p.type_id);
    postesData.push([p.id,c.nom,ctr.nom,p.label||'',p.zone||'',ptype.label,p.photo_url?'Oui':'Non']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(postesData),'Postes');

  // Feuille Résultats passages
  var resData=[['ID','Passage','Poste','Statut','Produit','Substance','Conso %','Note']];
  resultats.forEach(function(r){
    resData.push([r.id,r.passage_id,r.poste_id,r.statut||'',r.produit||'',r.substance||'',r.conso||'',r.note||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(resData),'Résultats');

  // Feuille Échéancier
  var echData=[['ID','Client','N° Contrat','Échéance','Date','Montant','Statut','Date facture']];
  echeancier.forEach(function(e){
    var c=gcl(e.client_id);
    echData.push([e.id,c.nom,e.num_contrat||'',e.echeance||'',e.date_echeance||'',e.montant||'',e.statut||'',e.date_facture||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(echData),'Échéancier');

  // Télécharger
  var today=new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb,'SGF-Nuisibles-Sauvegarde-'+today+'.xlsx');
  toast('✅ Sauvegarde Excel téléchargée !');
}

// Global event delegation - handles ALL dynamic buttons safely on Safari iOS
document.addEventListener('click', function(e){
  var btn = e.target.closest('[data-fn]');
  if(!btn) return;
  var fn = btn.getAttribute('data-fn');
  var cid = btn.getAttribute('data-cid');
  var ctid = btn.getAttribute('data-ctid');
  var eid = btn.getAttribute('data-eid');
  var pid = btn.getAttribute('data-pid');
  var passId = btn.getAttribute('data-passid');
  var val = btn.getAttribute('data-val');
  
  if(fn==='startTerrain') startTerrain(parseInt(cid), parseInt(ctid));
  else if(fn==='openPassagesDrw') openPassagesDrw(parseInt(ctid));
  else if(fn==='createPassage') createPassage(parseInt(cid), parseInt(ctid));
  else if(fn==='openTerrain') openTerrain(parseInt(passId));
  else if(fn==='exportPDF') exportPDF(parseInt(passId));
  else if(fn==='emailPassage') emailPassage(parseInt(passId));
  else if(fn==='markPaye') markEcheancePaye(parseInt(eid));
  else if(fn==='deleteEch') deleteEcheance(parseInt(eid));
  else if(fn==='openClientDrw') openClientDrw(parseInt(cid));
  else if(fn==='go') go(val);
  else if(fn==='pinClick') pinClick(e, parseInt(pid), parseInt(passId));
  else if(fn==='setStatut') setStatut(parseInt(pid), val, parseInt(passId));
});

// Navigation par swipe
var swipeStartX=0,swipeStartY=0;
var views=['clients','terrain','rapports','facturation'];
document.addEventListener('touchstart',function(e){
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-swipeStartX;
  var dy=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx))return;
  var idx=views.indexOf(curView);
  if(dx<0&&idx<views.length-1)go(views[idx+1]);
  else if(dx>0&&idx>0)go(views[idx-1]);
},{passive:true});

    await loadAll();

    go('clients');
    toast('✅ Connecté !');

    var msg=document.getElementById('load-msg');
    if(msg){msg.style.color='#e63030';msg.style.fontSize='13px';msg.textContent='⚠️ Erreur : '+err.message+' — Rechargez la page';}
  }
}
init();
